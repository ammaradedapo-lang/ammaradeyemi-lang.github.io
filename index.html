<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Feyikemi ❤️</title>
https://ammaradedapo-lang.github.io/ammaradeyemi-lang.github.io/
<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(-45deg, #ff4b5c, #ff6f91, #845ec2, #2c73d2);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

h1 {
  font-size: 38px;
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

p {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 4s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div>
  <h1>I love you, Feyikemi ❤️</h1>
  <p>You might not see it yet… but you’ve become something really special to me.</p>
</div>

<script>
for(let i=0; i<25; i++){
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(heart);
}
</script>

</body>
</html>
