<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Pacifico', cursive;
      color: white;
    }

    .screen {
      text-align: center;
      font-size: 45px;
      max-width: 80%;
      animation: fade 2s ease-in-out;
    }

    @keyframes fade {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .heart {
      position: absolute;
      color: #ff3366;
      font-size: 20px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #ff3366;
      color: white;
      font-size: 18px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="screen" id="screen">
  <div id="text">Press Start ❤️</div>
  <button class="btn" onclick="start()">Start</button>
</div>

<script>
  const scenes = [
    "It all started with you...",
    "Then everything changed quietly...",
    "You became my favorite thought...",
    "Even my silence thinks about you...",
    "I don’t know how, but you matter a lot...",
    "I love you ❤️"
  ];

  let i = 0;
  let screen = document.getElementById("screen");

  function start() {
    showScene();
    setInterval(showScene, 3500);
  }

  function showScene() {
    screen.innerHTML = "<div>" + scenes[i] + "</div>";
    i = (i + 1) % scenes.length;
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }

  setInterval(createHeart, 250);
</script>

</body>
</html>
